<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كود نيمز الاحترافية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --red-team: #e74c3c;
            --blue-team: #3498db;
            --neutral: #ebd5b3;
            --assassin: #2c3e50;
            --bg-color: #1a1a2e;
            --text-color: #ffffff;
            --card-front: #ffffff;
            --card-text: #2c3e50;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 1000px;
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.1);
            padding: 15px 30px;
            border-radius: 15px;
            box-sizing: border-box;
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
        }

        .score-board {
            display: flex;
            gap: 30px;
            font-size: 24px;
            font-weight: bold;
        }

        .score-red { color: var(--red-team); }
        .score-blue { color: var(--blue-team); }

        .turn-indicator {
            font-size: 22px;
            font-weight: 900;
            padding: 5px 15px;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            font-family: 'Cairo', sans-serif;
            padding: 10px 25px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        button:hover { transform: translateY(-2px); opacity: 0.9; }
        button:active { transform: translateY(0); }

        .btn-new { background-color: #2ecc71; color: white; }
        .btn-spy { background-color: #9b59b6; color: white; }
        .btn-end-turn { background-color: #f1c40f; color: #2c3e50; }

        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            max-width: 1000px;
            width: 100%;
        }

        .card {
            background-color: var(--card-front);
            color: var(--card-text);
            height: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            border-radius: 10px;
            box-shadow: 0 6px 10px rgba(0,0,0,0.15);
            cursor: pointer;
            font-size: 20px;
            font-weight: 900;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            user-select: none;
            position: relative;
            overflow: hidden;
        }

        .card:hover:not(.revealed) {
            transform: translateY(-5px) scale(1.03);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        /* تأثير اكتشاف الكارت */
        .card.revealed {
            transform: scale(0.95);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
            color: white;
            cursor: default;
        }

        .card.revealed.red { background-color: var(--red-team); }
        .card.revealed.blue { background-color: var(--blue-team); }
        .card.revealed.neutral { background-color: var(--neutral); color: var(--card-text); }
        .card.revealed.assassin { background-color: var(--assassin); }

        /* وضع القائد - تلوين خفيف لمعرفة الأدوار */
        .spymaster-mode .card:not(.revealed)::after {
            content: '';
            position: absolute;
            top: 5px;
            right: 5px;
            bottom: 5px;
            left: 5px;
            border-radius: 6px;
            border: 4px solid transparent;
            pointer-events: none;
        }

        .spymaster-mode .card.red:not(.revealed)::after { border-color: rgba(231, 76, 60, 0.6); background: rgba(231, 76, 60, 0.1); }
        .spymaster-mode .card.blue:not(.revealed)::after { border-color: rgba(52, 152, 219, 0.6); background: rgba(52, 152, 219, 0.1); }
        .spymaster-mode .card.neutral:not(.revealed)::after { border-color: rgba(235, 213, 179, 0.6); background: rgba(235, 213, 179, 0.2); }
        .spymaster-mode .card.assassin:not(.revealed)::after { border-color: rgba(44, 62, 80, 0.8); background: rgba(44, 62, 80, 0.2); }

        /* شاشة النهاية (Modal) */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            z-index: 1000;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background: white;
            color: #2c3e50;
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            transform: scale(0.7);
            transition: transform 0.3s;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .modal-overlay.active .modal-content { transform: scale(1); }
        .modal-content h2 { font-size: 36px; margin-top: 0; }
        .modal-content p { font-size: 20px; }

        @media (max-width: 768px) {
            .grid { grid-template-columns: repeat(5, 1fr); gap: 6px; }
            .card { height: 70px; font-size: 14px; }
            .header { flex-direction: column; gap: 10px; }
        }
        @media (max-width: 480px) {
            .grid { grid-template-columns: repeat(4, 1fr); }
            .card { font-size: 13px; }
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="score-board">
            <div class="score-red" id="red-score">الأحمر: 0</div>
            <div class="score-blue" id="blue-score">الأزرق: 0</div>
        </div>
        <div id="turn-display" class="turn-indicator">دور فريق: --</div>
    </div>

    <div class="controls">
        <button class="btn-new" onclick="initGame()">لعبة جديدة</button>
        <button class="btn-spy" onclick="toggleSpymaster()">نظرة القائد 👁️</button>
        <button class="btn-end-turn" onclick="endTurn()">إنهاء الدور ⏭️</button>
    </div>

    <div id="game-grid" class="grid"></div>

    <div class="modal-overlay" id="game-over-modal">
        <div class="modal-content">
            <h2 id="modal-title">انتهت اللعبة!</h2>
            <p id="modal-desc"></p>
            <button class="btn-new" onclick="initGame()">العب مرة تانية</button>
        </div>
    </div>

    <script>
        const wordBank = [
            "مصر", "أسد", "بحر", "قمر", "شمس", "قلم", "كتاب", "هرم", "طائرة", "قطار",
            "قهوة", "شجرة", "عجلة", "ساعة", "نار", "ثلج", "جبل", "مفتاح", "خاتم", "سيف",
            "طبيب", "مدرسة", "مستشفى", "شرطة", "سفينة", "فضاء", "نجمة", "مطر", "ذهب", "فضة",
            "حديد", "خشب", "باب", "شباك", "فيل", "كلب", "قطة", "حصان", "نمر", "فأر",
            "بطة", "تفاحة", "موز", "عنب", "رمل", "زجاج", "عطر", "صوت", "لون", "حلم"
        ];

        let cards = [];
        let isSpymaster = false;
        let currentTurn = '';
        let redRemaining = 0;
        let blueRemaining = 0;
        let gameActive = false;

        function shuffle(array) {
            return array.sort(() => Math.random() - 0.5);
        }

        function initGame() {
            document.getElementById('game-over-modal').classList.remove('active');
            const gridElement = document.getElementById('game-grid');
            gridElement.classList.remove('spymaster-mode');
            isSpymaster = false;
            gameActive = true;

            // تحديد الفريق اللي هيبدأ عشوائياً
            currentTurn = Math.random() < 0.5 ? 'red' : 'blue';
            
            redRemaining = currentTurn === 'red' ? 9 : 8;
            blueRemaining = currentTurn === 'blue' ? 9 : 8;

            updateUI();

            let selectedWords = shuffle([...wordBank]).slice(0, 25);
            
            let roles = [
                ...Array(redRemaining).fill('red'),
                ...Array(blueRemaining).fill('blue'),
                ...Array(1).fill('assassin'),
                ...Array(7).fill('neutral')
            ];
            roles = shuffle(roles);

            cards = selectedWords.map((word, index) => ({
                word: word,
                role: roles[index],
                revealed: false
            }));

            renderGrid();
        }

        function renderGrid() {
            const gridElement = document.getElementById('game-grid');
            gridElement.innerHTML = '';

            cards.forEach((card, index) => {
                const cardDiv = document.createElement('div');
                cardDiv.className = `card ${card.role} ${card.revealed ? 'revealed' : ''}`;
                cardDiv.innerText = card.word;

                cardDiv.onclick = () => handleCardClick(index);
                gridElement.appendChild(cardDiv);
            });
        }

        function handleCardClick(index) {
            if (!gameActive || isSpymaster || cards[index].revealed) return;

            let card = cards[index];
            card.revealed = true;
            renderGrid();

            if (card.role === 'assassin') {
                gameOver(currentTurn === 'red' ? 'blue' : 'red', 'القاتل! الكارت الأسود دمر الفريق.');
                return;
            }

            if (card.role === 'red') {
                redRemaining--;
                if (redRemaining === 0) gameOver('red', 'الفريق الأحمر لقى كل الكروت بتاعته!');
                else if (currentTurn !== 'red') endTurn(); // لو الأزرق اختار أحمر بالغلط
            } 
            else if (card.role === 'blue') {
                blueRemaining--;
                if (blueRemaining === 0) gameOver('blue', 'الفريق الأزرق لقى كل الكروت بتاعته!');
                else if (currentTurn !== 'blue') endTurn(); // لو الأحمر اختار أزرق بالغلط
            } 
            else if (card.role === 'neutral') {
                endTurn(); // الكارت المدني بينهي الدور فوراً
            }

            updateUI();
        }

        function endTurn() {
            if (!gameActive) return;
            currentTurn = currentTurn === 'red' ? 'blue' : 'red';
            updateUI();
        }

        function updateUI() {
            document.getElementById('red-score').innerText = `الأحمر: ${redRemaining}`;
            document.getElementById('blue-score').innerText = `الأزرق: ${blueRemaining}`;
            
            const turnDisplay = document.getElementById('turn-display');
            if (currentTurn === 'red') {
                turnDisplay.innerText = "دور فريق: الأحمر";
                turnDisplay.style.backgroundColor = "var(--red-team)";
                turnDisplay.style.color = "white";
            } else {
                turnDisplay.innerText = "دور فريق: الأزرق";
                turnDisplay.style.backgroundColor = "var(--blue-team)";
                turnDisplay.style.color = "white";
            }
        }

        function toggleSpymaster() {
            isSpymaster = !isSpymaster;
            const gridElement = document.getElementById('game-grid');
            if (isSpymaster) {
                gridElement.classList.add('spymaster-mode');
            } else {
                gridElement.classList.remove('spymaster-mode');
            }
        }

        function gameOver(winner, reason) {
            gameActive = false;
            const modal = document.getElementById('game-over-modal');
            const title = document.getElementById('modal-title');
            const desc = document.getElementById('modal-desc');

            modal.classList.add('active');
            
            if (winner === 'red') {
                title.innerText = "🏆 الفريق الأحمر فاز! 🏆";
                title.style.color = "var(--red-team)";
            } else {
                title.innerText = "🏆 الفريق الأزرق فاز! 🏆";
                title.style.color = "var(--blue-team)";
            }
            desc.innerText = reason;
            
            // كشف كل الكروت في النهاية
            cards.forEach(c => c.revealed = true);
            renderGrid();
        }

        window.onload = initGame;
    </script>
</body>
</html>
